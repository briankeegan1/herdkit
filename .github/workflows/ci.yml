name: CI

# Cross-platform hermetic-suite gate (HERD-167).
#
# WSL2-FIRST POLICY (2026-07-08): the supported way to run herdkit on Windows is WSL2, not
# native Git Bash (bash/locale/python3 divergences make Git Bash too spotty to gate on — see
# docs/windows.md). WSL2 semantics ARE Linux semantics, so the `ubuntu` leg below IS the
# Windows/WSL2 coverage. Consequently:
#   • ubuntu + macOS   — run the hermetic suite; REQUIRED green. ubuntu doubles as WSL2.
#   • windows-latest   — a MINIMAL advisory smoke (scripts/ci/windows-smoke.sh): LF/.gitattributes
#                        + docs sanity + `bash -n`. NOT the full suite chasing Git Bash greens,
#                        and it does NOT spin up nested WSL inside the runner. Advisory only.
#
# The suite is HERMETIC (stubs claude/herdr/gh, no network). scripts/ci/run-suite.sh mirrors
# .herd/healthcheck.project.sh's own fallback: with bats installed (as below, and as on the
# auto-merge watcher) it runs the curated `tests/*.bats` gate — the SAME authoritative set the
# watcher gates on; without bats it runs tests/test-*.sh directly, marking KNOWN env-sensitive
# tests XFAIL via tests/known-env-sensitive.tsv (never hacked green).

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  # Deterministic terminal + locale so tput-cols-driven rendering and emoji greps behave the
  # same on every leg (a runner with no TERM makes `tput cols` diverge from the maintainer's box).
  LANG: C.UTF-8
  LC_ALL: C.UTF-8
  TERM: xterm

jobs:
  suite:
    name: suite (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest   # doubles as the WSL2 coverage (WSL2 == Linux semantics)
            platform: ubuntu
          - os: macos-latest
            platform: macos
    env:
      HERD_CI_PLATFORM: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install bats (curated gate — mirrors the auto-merge watcher)
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then brew install bats-core; else sudo apt-get update && sudo apt-get install -y bats; fi
          bats --version
      - name: Configure git identity (runners ship none; hermetic tests commit)
        run: |
          git config --global user.name  "herdkit CI"
          git config --global user.email "ci@herdkit.local"
          git config --global init.defaultBranch main
      - name: Show environment
        run: |
          echo "platform: $HERD_CI_PLATFORM   uname: $(uname -a)"
          echo "bash: $BASH_VERSION   TERM: $TERM   cols: $(tput cols 2>/dev/null || echo n/a)"
          python3 --version || echo "python3: not found"
      - name: Run hermetic suite
        run: bash scripts/ci/run-suite.sh

  windows-smoke:
    # WSL2-first: Windows gets a fast ADVISORY smoke, not the full suite. continue-on-error so a
    # Git Bash quirk never blocks a merge — the ubuntu leg is the authoritative Windows/WSL2 gate.
    name: windows-smoke (advisory)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Windows advisory smoke
        run: bash scripts/ci/windows-smoke.sh
